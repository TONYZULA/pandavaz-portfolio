    <title>Pandavaz Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { opacity: 0.9; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        .page {
            background: #fff;
            margin-bottom: 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .page img {
            width: 100%;
            height: auto;
            display: block;
        }
        .page-number {
            display: none;
        }
        .nav {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
        }
        .nav a {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
            transition: transform 0.3s;
        }
        .nav a:hover { transform: scale(1.05); }
    </style>
</head>
